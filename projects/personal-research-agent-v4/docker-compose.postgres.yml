services:
  postgres:
    image: postgres:15
    container_name: pra-v4-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pra_v4}
      POSTGRES_USER: ${POSTGRES_USER:-pra_v4}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pra_v4_dev_password}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pra_v4_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pra_v4} -d ${POSTGRES_DB:-pra_v4}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 8s

volumes:
  pra_v4_postgres_data:
